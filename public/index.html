<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechDrop – Amazon Tech Deals</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #222;
    }

    header {
      background: #131921;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    header h1 { font-size: 1.6rem; letter-spacing: 1px; }
    header h1 span { color: #febd69; }

    #search-form {
      display: flex;
      flex: 1;
      max-width: 600px;
    }

    #search-input {
      flex: 1;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 4px 0 0 4px;
      font-size: 1rem;
    }

    #search-form button {
      padding: 0.5rem 1rem;
      background: #febd69;
      border: none;
      border-radius: 0 4px 4px 0;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }

    #search-form button:hover { background: #f3a847; }

    main { padding: 2rem; }

    #status {
      text-align: center;
      color: #555;
      margin-bottom: 1rem;
      min-height: 1.4rem;
    }

    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .product-card {
      background: #fff;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.15s;
    }

    .product-card:hover { transform: translateY(-3px); }

    .product-card img {
      max-width: 160px;
      max-height: 160px;
      object-fit: contain;
      margin-bottom: 0.75rem;
    }

    .product-card h3 {
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      flex: 1;
    }

    .product-card .price {
      font-size: 1.1rem;
      font-weight: 700;
      color: #b12704;
      margin-bottom: 0.75rem;
    }

    .product-card a {
      display: inline-block;
      padding: 0.45rem 1rem;
      background: #febd69;
      color: #111;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .product-card a:hover { background: #f3a847; }

    footer {
      text-align: center;
      padding: 2rem;
      color: #888;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Tech<span>Drop</span></h1>
    <form id="search-form">
      <input id="search-input" type="text" placeholder="Search for tech products…" required />
      <button type="submit">Search</button>
    </form>
  </header>

  <main>
    <p id="status">Enter a search term to find deals on Amazon.</p>
    <div id="results"></div>
  </main>

  <footer>
    <p>As an Amazon Associate I earn from qualifying purchases.</p>
  </footer>

  <script>
    const form = document.getElementById('search-form');
    const input = document.getElementById('search-input');
    const resultsEl = document.getElementById('results');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const keyword = input.value.trim();
      if (!keyword) return;

      statusEl.textContent = 'Searching…';
      resultsEl.innerHTML = '';

      try {
        const res = await fetch(`/api/search?keyword=${encodeURIComponent(keyword)}`);
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const { items } = await res.json();

        if (!items || items.length === 0) {
          statusEl.textContent = 'No results found. Try a different keyword.';
          return;
        }

        statusEl.textContent = `Found ${items.length} result(s) for "${keyword}"`;
        items.forEach((item) => {
          const title = item?.ItemInfo?.Title?.DisplayValue ?? 'Unknown Product';
          const imgUrl = item?.Images?.Primary?.Medium?.URL ?? '';
          const price = item?.Offers?.Listings?.[0]?.Price?.DisplayAmount ?? 'See on Amazon';
          const rawUrl = item?.DetailPageURL ?? '';
          let detailUrl = '#';
          try {
            const parsed = new URL(rawUrl);
            if (/^https?:$/.test(parsed.protocol) && /amazon\.(com|co\.uk|co\.jp|de|fr|it|es|ca|com\.au)$/.test(parsed.hostname)) {
              detailUrl = parsed.href;
            }
          } catch (_) { /* keep detailUrl as '#' */ }

          const card = document.createElement('div');
          card.className = 'product-card';

          if (imgUrl) {
            const img = document.createElement('img');
            img.src = imgUrl;
            img.alt = title;
            img.loading = 'lazy';
            card.appendChild(img);
          }

          const h3 = document.createElement('h3');
          h3.textContent = title;
          card.appendChild(h3);

          const priceEl = document.createElement('p');
          priceEl.className = 'price';
          priceEl.textContent = price;
          card.appendChild(priceEl);

          const link = document.createElement('a');
          link.href = detailUrl;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = 'View on Amazon';
          card.appendChild(link);

          resultsEl.appendChild(card);
        });
      } catch (err) {
        statusEl.textContent = 'Failed to load products. Please try again later.';
        console.error(err);
      }
    });
  </script>
</body>
</html>
